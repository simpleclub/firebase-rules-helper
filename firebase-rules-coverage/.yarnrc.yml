nodeLinker: node-modules

npmMinimalAgeGate: '3d'

# If you need to install a package version with a security fix younger than 3 days, add the following:
# - 'package@X.Y.Z'
#
# Specify the exact package and version, don't use version ranges.
npmPreapprovedPackages:
  - 'tmp@0.2.6' # fixes GHSA-ph9p-34f9-6g65 / CVE-2026-44705
  - 'tmp@0.2.7' # fixes GHSA-ph9p-34f9-6g65 / CVE-2026-44705

# The majority of NPM supply chain attacks are conducted via running scripts after installation.
# Most packages don't need to be running any scripts, so we should be disabling this by default.
# If a package needs to be running scripts, you can enable scripts for this package again:
# In the package.json specify a `dependenciesMeta` with the package as the key and a flag `built: true`.
# {
#   ...,
#   "dependencies": {...},
#   "dependenciesMeta": {
#     "<package>": {
#       "built": true
#     }
#   }
# }
enableScripts: false
